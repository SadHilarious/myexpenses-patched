name: Build Patched MyExpenses

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Patch Repository
        uses: actions/checkout@v4
        with:
          path: patch-repo

      - name: Checkout Original MyExpenses Repository
        uses: actions/checkout@v4
        with:
          repository: mtotschnig/MyExpenses
          path: src
          # Optionally checkout a specific branch or tag if needed
          # ref: master 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Patch Script
        run: |
          python patch-repo/patch.py src/myExpenses/src/main/java/org/totschnig/myexpenses/util/licence/LicenceHandler.kt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x src/gradlew

      - name: Build Debug APK
        working-directory: src
        run: ./gradlew myExpenses:assembleExternDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myexpenses-patched-debug
          path: src/myExpenses/build/outputs/apk/extern/debug/*.apk
